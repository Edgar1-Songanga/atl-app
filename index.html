<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ATL App</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-100">

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App() {
  const [page, setPage] = useState("dashboard");
  const [paid, setPaid] = useState(false);
  const [checked, setChecked] = useState(false);

  return (
    <div className="max-w-md mx-auto min-h-screen p-4">

      {/* HEADER */}
      <div className="text-center mb-4">
        <h1 className="text-2xl font-bold text-yellow-600">ATL Smart</h1>
      </div>

      {/* NAV */}
      <div className="flex justify-between bg-white p-3 rounded-2xl shadow mb-4">
        <button onClick={() => setPage("dashboard")}>Home</button>
        <button onClick={() => setPage("child")}>Criança</button>
        <button onClick={() => setPage("payments")}>Pagamentos</button>
        <button onClick={() => setPage("checkin")}>Check-in</button>
      </div>

      {page === "dashboard" && <Dashboard setPage={setPage} />}
      {page === "child" && <Child />}
      {page === "payments" && <Payments paid={paid} setPaid={setPaid} />}
      {page === "checkin" && <CheckIn checked={checked} setChecked={setChecked} />}

    </div>
  );
}

function Dashboard({ setPage }) {
  return (
    <div className="bg-white p-5 rounded-2xl shadow">
      <h2 className="text-xl font-bold">Olá 👋</h2>

      <div className="bg-green-100 p-3 rounded-xl mt-3">
        🟢 João está no ATL
      </div>

      <div className="mt-3">
        <h3 className="font-semibold">Atividades</h3>
        <ul className="text-gray-600 text-sm">
          <li>📚 Estudo</li>
          <li>🎨 Desenho</li>
        </ul>
      </div>

      <button 
        onClick={() => setPage("payments")}
        className="bg-yellow-500 text-white w-full py-2 rounded-xl mt-4">
        Pagar Mensalidade
      </button>
    </div>
  );
}

function Child() {
  return (
    <div className="bg-white p-5 rounded-2xl shadow">
      <h2 className="text-xl font-bold">João Silva</h2>
      <p className="text-gray-500">8 anos</p>

      <div className="bg-red-100 p-2 mt-3 rounded">
        ⚠️ Alergia: Amendoim
      </div>

      <div className="mt-4">
        <h3 className="font-semibold">Fotos</h3>
        <div className="grid grid-cols-3 gap-2 mt-2">
          <div className="bg-gray-200 h-20 rounded"></div>
          <div className="bg-gray-200 h-20 rounded"></div>
          <div className="bg-gray-200 h-20 rounded"></div>
        </div>
      </div>
    </div>
  );
}

function Payments({ paid, setPaid }) {
  return (
    <div className="bg-white p-5 rounded-2xl shadow text-center">
      {!paid ? (
        <>
          <h2 className="text-xl font-bold">Mensalidade</h2>
          <p className="text-red-500 mt-2">Pendente</p>

          <button 
            onClick={() => setPaid(true)}
            className="bg-green-500 text-white w-full py-2 mt-4 rounded-xl">
            Pagar 80.000 Kz
          </button>
        </>
      ) : (
        <div>
          <h2 className="text-green-600 text-xl font-bold">Pagamento OK</h2>
          <p className="mt-2">✔️ ATL: 72.000 Kz</p>
          <p>✔️ Plataforma: 8.000 Kz</p>
        </div>
      )}
    </div>
  );
}

function CheckIn({ checked, setChecked }) {
  return (
    <div className="bg-white p-5 rounded-2xl shadow text-center">
      {!checked ? (
        <>
          <h2 className="text-xl font-bold">Check-in</h2>

          <button 
            onClick={() => setChecked(true)}
            className="bg-blue-500 text-white px-4 py-2 rounded-xl mt-4">
            Simular Check-in
          </button>
        </>
      ) : (
        <h2 className="text-green-600 font-bold">
          ✅ Check-in realizado
        </h2>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
  </html>
