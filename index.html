<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATL Smart Elite</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
  }
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

function App() {
  const [page, setPage] = useState("dashboard");
  const [paid, setPaid] = useState(false);

  return (
    <div className="max-w-md mx-auto min-h-screen p-4">

      {/* HEADER */}
      <div className="flex justify-between items-center mb-6">
        <h1 className="text-xl font-bold text-yellow-400">ATL Smart</h1>
        <div className="text-sm text-gray-300">Premium</div>
      </div>

      {/* NAV */}
      <div className="flex justify-between bg-white/10 backdrop-blur-lg p-3 rounded-2xl mb-6 text-sm">
        <NavBtn label="Home" onClick={() => setPage("dashboard")} />
        <NavBtn label="Criança" onClick={() => setPage("child")} />
        <NavBtn label="Pagamentos" onClick={() => setPage("payments")} />
      </div>

      {page === "dashboard" && <Dashboard setPage={setPage} />}
      {page === "child" && <Child />}
      {page === "payments" && <Payments paid={paid} setPaid={setPaid} />}

    </div>
  );
}

function NavBtn({ label, onClick }) {
  return (
    <button onClick={onClick} className="text-gray-200 hover:text-yellow-400">
      {label}
    </button>
  );
}

function Card({ children }) {
  return (
    <div className="bg-white/10 backdrop-blur-xl p-5 rounded-2xl shadow-lg mb-4">
      {children}
    </div>
  );
}

function Dashboard({ setPage }) {
  return (
    <div>

      {/* HERO */}
      <div className="relative rounded-2xl overflow-hidden mb-4">
        <img 
          src="https://images.unsplash.com/photo-1588072432836-e10032774350"
          className="h-44 w-full object-cover opacity-70"
        />
        <div className="absolute bottom-3 left-3">
          <h2 className="text-lg font-bold">João está no ATL</h2>
        </div>
      </div>

      <Card>
        <h2 className="font-semibold">Atividades</h2>
        <ul className="text-sm text-gray-300 mt-2">
          <li>📚 Estudo</li>
          <li>🎨 Pintura</li>
          <li>⚽ Jogos</li>
        </ul>

        <button 
          onClick={() => setPage("payments")}
          className="bg-gradient-to-r from-yellow-400 to-yellow-600 text-black w-full py-2 rounded-xl mt-4 font-bold">
          Pagar Mensalidade
        </button>
      </Card>

    </div>
  );
}

function Child() {
  return (
    <Card>

      <div className="flex items-center gap-4">
        <img 
          src="https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9"
          className="w-16 h-16 rounded-full object-cover border-2 border-yellow-400"
        />
        <div>
          <h2 className="font-bold">João Silva</h2>
          <p className="text-sm text-gray-400">8 anos</p>
        </div>
      </div>

      <div className="bg-red-500/20 p-2 mt-4 rounded text-sm">
        ⚠️ Alergia: Amendoim
      </div>

      <div className="mt-4 text-sm">
        <p>👨‍👩‍👦 Edgar Songanga</p>
        <p className="text-gray-400">+244 921 713 644</p>
      </div>

      <div className="mt-4">
        <h3 className="text-sm font-semibold">Galeria</h3>
        <div className="grid grid-cols-3 gap-2 mt-2">
          <img src="https://images.unsplash.com/photo-1588072432836-e10032774350" className="rounded h-20 object-cover"/>
          <img src="https://images.unsplash.com/photo-1596495578065-6e0763fa1178" className="rounded h-20 object-cover"/>
          <img src="https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9" className="rounded h-20 object-cover"/>
        </div>
      </div>

    </Card>
  );
}

function Payments({ paid, setPaid }) {
  return (
    <Card>

      {!paid ? (
        <>
          <h2 className="text-lg font-bold">Pagamento</h2>
          <p className="text-red-400 mt-2">Pendente</p>

          <button 
            onClick={() => setPaid(true)}
            className="bg-green-500 w-full py-2 mt-4 rounded-xl font-bold">
            Pagar 80.000 Kz
          </button>
        </>
      ) : (
        <>
          <h2 className="text-green-400 font-bold">Pagamento Confirmado</h2>
          <p className="text-sm mt-2">ATL: 72.000 Kz</p>
          <p className="text-sm">Plataforma: 8.000 Kz</p>
        </>
      )}

    </Card>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
