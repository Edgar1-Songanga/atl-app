<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ATL Smart Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {
  margin:0;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

// IMAGENS DINÂMICAS
const images = [
  "https://images.unsplash.com/photo-1588072432836-e10032774350",
  "https://images.unsplash.com/photo-1509062522246-3755977927d7",
  "https://images.unsplash.com/photo-1529333166437-7750a6dd5a70"
];

function App() {
  const [page, setPage] = useState("home");
  const [children, setChildren] = useState(generateChildren());
  const [bgIndex, setBgIndex] = useState(0);

  useEffect(() => {
    setInterval(() => {
      setBgIndex(i => (i + 1) % images.length);
    }, 4000);
  }, []);

  return (
    <div className="min-h-screen text-white">

      {/* BACKGROUND DINÂMICO */}
      <div 
        className="fixed inset-0 bg-cover bg-center transition-all duration-1000"
        style={{ backgroundImage: `url(${images[bgIndex]})` }}
      />

      <div className="relative z-10 p-4 backdrop-blur-md bg-black/40 min-h-screen">

        {/* HEADER */}
        <div className="flex justify-between mb-4">
          <h1 className="text-xl font-bold text-yellow-400">ATL Smart</h1>
          <button onClick={() => setPage("register")}>+ Inscrever</button>
        </div>

        {/* MENU */}
        <div className="flex gap-3 mb-4">
          <button onClick={() => setPage("home")}>Home</button>
          <button onClick={() => setPage("children")}>Crianças</button>
        </div>

        {page === "home" && <Home children={children} />}
        {page === "children" && <ChildrenList children={children} />}
        {page === "register" && <Register setChildren={setChildren} />}

      </div>
    </div>
  );
}

// GERAR 100 CRIANÇAS
function generateChildren() {
  return Array.from({ length: 100 }, (_, i) => ({
    id: i,
    name: "Criança " + (i + 1),
    age: Math.floor(Math.random() * 10) + 5
  }));
}

// HOME DINÂMICO
function Home({ children }) {
  return (
    <div className="bg-white/10 p-5 rounded-2xl">

      <h2 className="text-lg font-bold">Dashboard ATL</h2>

      <div className="mt-4 grid grid-cols-2 gap-3">

        <Stat title="Crianças" value={children.length} />
        <Stat title="Presentes" value={Math.floor(children.length * 0.8)} />
        <Stat title="Receita" value="8.000.000 Kz" />
        <Stat title="Staff" value="12" />

      </div>

      <div className="mt-4">
        <h3 className="font-semibold">Atividades hoje</h3>
        <p className="text-sm">Estudo • Desenho • Jogos</p>
      </div>

    </div>
  );
}

function Stat({ title, value }) {
  return (
    <div className="bg-black/30 p-3 rounded-xl text-center">
      <p className="text-sm">{title}</p>
      <p className="text-xl font-bold">{value}</p>
    </div>
  );
}

// LISTA DE CRIANÇAS
function ChildrenList({ children }) {
  return (
    <div className="space-y-2">

      {children.slice(0, 20).map(c => (
        <div key={c.id} className="bg-white/10 p-3 rounded-xl flex justify-between">
          <span>{c.name}</span>
          <span>{c.age} anos</span>
        </div>
      ))}

    </div>
  );
}

// FORMULÁRIO REAL
function Register({ setChildren }) {
  const [name, setName] = useState("");
  const [age, setAge] = useState("");

  const submit = () => {
    if (!name || !age) return alert("Preencha tudo");

    setChildren(prev => [
      ...prev,
      { id: Date.now(), name, age }
    ]);

    alert("Criança registada!");
  };

  return (
    <div className="bg-white/10 p-5 rounded-2xl">

      <h2 className="text-lg font-bold">Inscrever Criança</h2>

      <input 
        placeholder="Nome"
        className="w-full p-2 mt-3 rounded text-black"
        onChange={e => setName(e.target.value)}
      />

      <input 
        placeholder="Idade"
        className="w-full p-2 mt-3 rounded text-black"
        onChange={e => setAge(e.target.value)}
      />

      <button 
        onClick={submit}
        className="bg-yellow-500 w-full py-2 mt-4 rounded">
        Registrar
      </button>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
