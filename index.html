<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATL Smart Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{margin:0}
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(10px)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const images = [
  "https://images.unsplash.com/photo-1496483353456-9094fc0b559a",
  "https://images.unsplash.com/photo-1520975922284-3f2bb37262f9",
  "https://images.unsplash.com/photo-1503676260728-1c00da094a0b",
  "https://images.unsplash.com/photo-1472289065668-ce198be0c114"
];

function generateChildren(){
  return Array.from({length:200},(_,i)=>({
    id:i+1,
    name:"Criança "+(i+1),
    age:Math.floor(Math.random()*10)+5,
    photo:"https://i.pravatar.cc/100?img="+((i%70)+1)
  }));
}

function App(){
  const [page,setPage]=useState("home");
  const [children,setChildren]=useState(()=>generateChildren());
  const [bg,setBg]=useState(0);

  useEffect(()=>{
    const id=setInterval(()=>setBg(b=>(b+1)%images.length),5000);
    return()=>clearInterval(id);
  },[]);

  return(
    <div className="min-h-screen text-white font-light">
      <div className="fixed inset-0 bg-center bg-cover transition-opacity duration-1000" style={{backgroundImage:`url(${images[bg]})`}}/>
      <div className="fixed inset-0 bg-black/55"/>
      <div className="relative z-10">
        <header className="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
          <h1 className="text-2xl tracking-widest font-semibold text-yellow-300">ATL Smart</h1>
          <nav className="hidden md:flex gap-6 text-sm opacity-90">
            <button onClick={()=>setPage("home")}>Home</button>
            <button onClick={()=>setPage("children")}>Crianças</button>
            <button onClick={()=>setPage("about")}>Sobre o ATL</button>
            <button onClick={()=>setPage("us")}>Sobre nós</button>
            <button onClick={()=>setPage("contact")}>Contacte-nos</button>
          </nav>
        </header>

        <main className="max-w-6xl mx-auto px-6 pb-20">
          {page==="home" && <Home children={children}/>}
          {page==="children" && <ChildrenList children={children}/>}
          {page==="about" && <About/>}
          {page==="us" && <Us/>}
          {page==="contact" && <Contact/>}
        </main>
      </div>
    </div>
  );
}

function Home({children}){
  return(
    <div className="space-y-10">
      <section className="glass rounded-3xl p-10">
        <p className="uppercase text-xs tracking-widest opacity-70">Bem-vindo ao</p>
        <h2 className="text-4xl md:text-5xl font-semibold mt-2">ATL Smart: onde crianças crescem felizes</h2>
        <p className="mt-4 opacity-80 max-w-xl">Programa de tempos livres com foco em estudo, arte e jogos. Segurança, carinho e resultados.</p>
        <button onClick={()=>alert("Inscrições abertas!")} className="mt-6 px-5 py-3 bg-yellow-400 text-black rounded-xl">Inscrever agora</button>
      </section>

      <section className="grid md:grid-cols-4 gap-4">
        {[
          ["Crianças",children.length],
          ["Presentes",Math.floor(children.length*0.82)],
          ["Staff",24],
          ["Avaliação", "4.9"]
        ].map(([t,v])=>(
          <div className="glass rounded-2xl p-6 text-center" key={t}>
            <p className="text-sm opacity-70">{t}</p>
            <p className="text-3xl font-semibold mt-1">{v}</p>
          </div>
        ))}
      </section>

      <section className="glass rounded-3xl p-8">
        <h3 className="text-xl font-semibold">Atividades de hoje</h3>
        <p className="opacity-80 mt-2">Estudo orientado • Desenho e pintura • Jogos cooperativos • Música</p>
      </section>

      <section className="glass rounded-3xl p-8">
        <h3 className="text-xl font-semibold mb-3">O que dizem os pais</h3>
        <p className="opacity-80 italic">“Meu filho adora ir ao ATL. Vejo evolução na leitura e na socialização.” — Mãe da Miriam</p>
      </section>
    </div>
  );
}

function ChildrenList({children}){
  return(
    <div>
      <h2 className="text-2xl font-semibold mb-4">Perfis de crianças</h2>
      <div className="grid md:grid-cols-3 gap-4">
        {children.slice(0,24).map(c=>(
          <div key={c.id} className="glass rounded-2xl p-4 flex items-center gap-4">
            <img src={c.photo} alt="" className="w-14 h-14 rounded-full"/>
            <div>
              <p className="font-medium">{c.name}</p>
              <p className="text-sm opacity-70">{c.age} anos</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function About(){
  return(
    <div className="glass rounded-3xl p-8 space-y-3">
      <h2 className="text-2xl font-semibold">Sobre o ATL</h2>
      <p className="opacity-80">Atividades de Tempos Livres para crianças dos 5 aos 14 anos. Apoio escolar, artes, desporto e vida em grupo. Protocolos de segurança e equipa certificada.</p>
    </div>
  );
}
function Us(){
  return(
    <div className="glass rounded-3xl p-8 space-y-3">
      <h2 className="text-2xl font-semibold">Sobre nós</h2>
      <p className="opacity-80">Equipa multidisciplinar com educadores, psicólogos e artistas. Parcerias locais e melhoria contínua.</p>
    </div>
  );
}
function Contact(){
  return(
    <div className="glass rounded-3xl p-8 space-y-3">
      <h2 className="text-2xl font-semibold">Contacte-nos</h2>
      <p className="opacity-80">Luanda • +244 900 000 000 • atlsmart@email.com</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
